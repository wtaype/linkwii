<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Feedback - LinkWii</title>
  <link rel="icon" href="/smile.avif">
  <meta name="theme-color" content="#FF5C69">
  <meta name="description" content="Ayúdanos a mejorar LinkWii. Tu opinión nos ayuda a crear la mejor herramienta de gestión de enlaces.">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --mco: #FF5C69;
      --bg: #fffcfc;
      --wb: #ffffff;
      --tx: #1e293b;
      --tx2: #475569;
      --tx3: #94a3b8;
      --brd: rgba(0,0,0,0.06);
      --ff: 'Outfit', sans-serif;
      --tr: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: var(--ff); 
      background: var(--bg); 
      color: var(--tx); 
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .feedback_wrap {
      max-width: 600px;
      width: 90%;
      margin: 4vh auto;
    }

    .feedback_card {
      background: var(--wb);
      border-radius: 40px;
      padding: 8vh 6vw;
      box-shadow: 0 40px 100px rgba(0,0,0,0.04);
      border: 1px solid var(--brd);
      text-align: center;
      position: relative;
    }

    .icon_box {
      width: 90px;
      height: 90px;
      background: rgba(255, 92, 105, 0.08);
      color: var(--mco);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      margin: 0 auto 4vh;
      transform: rotate(-8deg);
      transition: var(--tr);
    }
    .feedback_card:hover .icon_box { transform: rotate(0deg) scale(1.1); }

    h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 1rem; letter-spacing: -1.5px; }
    p { color: var(--tx2); margin-bottom: 5vh; font-size: 1.15rem; line-height: 1.6; }

    .channels {
      display: flex;
      flex-direction: column;
      gap: 2.5vh;
      margin-bottom: 6vh;
    }

    .channel_btn {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px;
      background: #f8fafc;
      border: 1px solid var(--brd);
      border-radius: 24px;
      text-decoration: none;
      color: var(--tx);
      transition: var(--tr);
      text-align: left;
    }

    .channel_btn.pri {
      background: var(--tx);
      color: white;
      border: none;
    }
    .channel_btn.pri i { color: #fff; }
    .channel_btn.pri .channel_info span { color: rgba(255,255,255,0.6); }

    .channel_btn:hover {
      transform: translateX(10px) translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.05);
    }
    .channel_btn.pri:hover {
        background: #000;
        box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    .channel_btn i { font-size: 1.8rem; color: var(--mco); }
    .channel_info b { display: block; font-size: 1.2rem; font-weight: 800; }
    .channel_info span { font-size: 0.95rem; color: var(--tx3); font-weight: 500; }

    .btn_back {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--tx3);
      font-weight: 700;
      text-decoration: none;
      transition: var(--tr);
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn_back:hover { color: var(--mco); transform: translateX(-5px); }

    @media (max-width: 480px) {
      .feedback_card { padding: 6vh 8vw; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="feedback_wrap">
    <div class="feedback_card">
      <div class="icon_box"><i class="fas fa-comment-dots"></i></div>
      <h1>¿Cómo podemos mejorar?</h1>
      <p>LinkWii crece con tu ayuda. Tu opinión nos ayuda a crear una herramienta más potente y profesional para todos.</p>
      
      <div class="channels">
        <a href="https://github.com/wtaype/linkwii/issues" target="_blank" class="channel_btn pri">
          <i class="fab fa-github"></i>
          <div class="channel_info">
            <b>GitHub Issues</b>
            <span>Reporta errores o pide nuevas funciones</span>
          </div>
        </a>

        <a href="mailto:wilder.taype@hotmail.com" class="channel_btn">
          <i class="fas fa-envelope"></i>
          <div class="channel_info">
            <b>Correo Directo</b>
            <span>Escríbenos a wilder.taype@hotmail.com</span>
          </div>
        </a>
      </div>

      <a href="/" class="btn_back"><i class="fas fa-arrow-left"></i> Volver a LinkWii</a>
    </div>
  </div>
</body>
</html>
