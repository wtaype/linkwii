<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="profile" />
  <link rel="icon" type="image/avif" href="/smile.avif" />
  <title>Linkwii</title>
  <style>
    /* ── Reset ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;-webkit-font-smoothing:antialiased}

    /* ── Base ── */
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f3f3f1;display:flex;justify-content:center;min-height:100vh}
    #pw_root{width:100%;max-width:700px;padding:52px 24px 90px;display:flex;flex-direction:column;align-items:center}

    /* ══════════════════════════════════════
       SKELETON — Visible desde el primer byte
    ══════════════════════════════════════ */
    #pw_skeleton{width:100%;display:flex;flex-direction:column;align-items:center}

    /* Efecto shimmer como YouTube / Facebook */
    @keyframes shimmer{0%{background-position:-700px 0}100%{background-position:700px 0}}
    .sk{
      background:#e8e8e8;
      background-image:linear-gradient(90deg,#e8e8e8 25%,#f4f4f4 50%,#e8e8e8 75%);
      background-size:700px 100%;
      animation:shimmer 1.4s infinite linear;
      border-radius:12px;
    }
    .sk-av {width:96px;height:96px;border-radius:50%;margin-bottom:18px}
    .sk-ttl{width:180px;height:20px;margin-bottom:10px}
    .sk-bio{width:260px;height:14px;margin-bottom:6px;opacity:.7}
    .sk-bio2{width:200px;height:14px;margin-bottom:36px;opacity:.5}
    .sk-btn{width:100%;height:56px;border-radius:30px;margin-bottom:14px}
    .sk-btn:nth-child(4){width:90%}
    .sk-btn:nth-child(5){width:80%}

    /* ══════════════════════════════════════
       PERFIL REAL
    ══════════════════════════════════════ */
    #pw_perfil{width:100%;display:flex;flex-direction:column;align-items:center}

    .pw_avatar{
      width:96px;height:96px;border-radius:50%;object-fit:cover;
      margin-bottom:16px;
      box-shadow:0 4px 20px rgba(0,0,0,.12);
      border:3px solid #fff;
    }
    .pw_nombre{font-size:20px;font-weight:800;color:#111;margin-bottom:6px;text-align:center}
    .pw_bio{font-size:15px;color:#555;text-align:center;line-height:1.6;max-width:500px;margin-bottom:32px}

    /* ── Links ── */
    .pw_links{width:100%;display:flex;flex-direction:column;gap:14px}

    .pw_btn{
      display:flex;align-items:center;justify-content:center;position:relative;
      width:100%;min-height:56px;padding:14px 20px;
      background:#fff;color:#111;text-decoration:none;
      border-radius:30px;font-size:15px;font-weight:600;
      border:1.5px solid #e8e8e8;
      box-shadow:0 2px 8px rgba(0,0,0,.05);
      transition:transform .18s,box-shadow .18s;
    }
    .pw_btn:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 6px 20px rgba(0,0,0,.09)}
    .pw_btn:active{transform:scale(.98)}
    .pw_btn_ico{position:absolute;left:18px;font-size:20px;display:flex;align-items:center}
    .pw_empty{color:#aaa;margin-top:20px;font-size:15px}

    /* ── Marca ── */
    .pw_marca{
      margin-top:52px;font-size:13px;font-weight:600;color:#aaa;
      display:flex;align-items:center;gap:6px;text-decoration:none;
      transition:color .2s;
    }
    .pw_marca:hover{color:#333}
    .pw_marca img{height:18px;border-radius:50%}

    /* ── Estado: No encontrado / Pausado / Error ── */
    .pw_msg{width:100%;text-align:center;padding-top:48px;display:flex;flex-direction:column;align-items:center;gap:8px}
    .pw_msg_ico{font-size:3.5rem;margin-bottom:8px}
    .pw_msg h2{font-size:22px;font-weight:800;color:#111}
    .pw_msg p{font-size:15px;color:#666;max-width:340px;line-height:1.5}
    .pw_cta_btn{
      display:inline-flex;align-items:center;gap:8px;
      margin-top:20px;padding:13px 30px;
      background:#111;color:#fff;text-decoration:none;
      border-radius:30px;font-weight:700;font-size:14px;
      border:none;cursor:pointer;transition:opacity .2s,transform .2s;
    }
    .pw_cta_btn:hover{opacity:.85;transform:translateY(-1px)}
  </style>
</head>

<body>
  <div id="pw_root">
    <div id="pw_skeleton">
      <div class="sk sk-av"></div>
      <div class="sk sk-ttl"></div>
      <div class="sk sk-bio"></div>
      <div class="sk sk-bio2"></div>
      <div class="sk sk-btn"></div>
      <div class="sk sk-btn"></div>
      <div class="sk sk-btn"></div>
    </div>
  </div>
  <script type="module" src="./smiles/perfilPublico.js"></script>
</body>

</html>
